name: Build iOS Client

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS SwiftUI Client
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Latest Xcode Version
        run: |
          echo "Available Xcode versions:"
          ls -d /Applications/Xcode*.app
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)
          echo "Selecting latest Xcode: $LATEST_XCODE"
          echo "DEVELOPER_DIR=$LATEST_XCODE/Contents/Developer" >> $GITHUB_ENV

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd ios
          xcodegen generate

      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild -project ios/bgrok.xcodeproj \
                     -scheme bgrok \
                     -resolvePackageDependencies

      - name: Build iOS App (Physical Device)
        run: |
          xcodebuild -project ios/bgrok.xcodeproj \
                     -scheme bgrok \
                     -sdk iphoneos \
                     -configuration Release \
                     -destination "generic/platform=iOS" \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_REQUIRED=NO \
                     SYMROOT=$(pwd)/build \
                     build

      - name: Create IPA Package
        run: |
          mkdir Payload
          cp -r build/Release-iphoneos/bgrok.app Payload/
          zip -r bgrok.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bgrok-ios-app
          path: bgrok.ipa
